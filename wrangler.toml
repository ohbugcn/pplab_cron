#:schema node_modules/wrangler/config-schema.json
name = "pplab-cron"
main = "src/index.js"
compatibility_date = "2025-03-24"

# Cloudflare Observability & Logs
[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Scheduled events (Cron jobs)
# This runs every day at 19:15 (local UTC+8 / 11:15 UTC)
[triggers]
crons = ["30 11 * * *"]

# Keep these secrets for Supabase integration
# Use `wrangler secret put <NAME>` to set these in production
# SUPABASE_URL = ""
# SUPABASE_SERVICE_ROLE_KEY = ""

# Read products.txt as a text module
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true
